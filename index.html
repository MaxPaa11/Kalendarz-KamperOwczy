<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kalendarz rezerwacji</title>

<!-- Firebase (do zapisu rezerwacji w chmurze) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>


<style>
  :root{
    --paper:#F7F4EE;
    --ink:#2B2A28;
    --ink-soft:#726F68;
    --line:#E3DED2;
    --card:#FFFFFF;
    --accent-a:#3F8F5C; /* Birmy i Zawrat - zielony */
    --accent-b:#3573B8; /* Rajeczniki - niebieski */
    --accent-c:#C2402E; /* NIEDOSTĘPNY - czerwony */
    --danger:#8C3323;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-tap-highlight-color:transparent;
    padding:16px 14px 40px;
    max-width:480px;
    margin:0 auto;
  }
  h1{font-size:19px;font-weight:700;letter-spacing:-0.01em;margin:4px 0 16px;}
  .status{font-size:12px;color:var(--ink-soft);margin:-10px 0 14px;}
  .month-nav{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:6px;margin-bottom:12px;}
  .nav-btn{width:42px;height:42px;border:none;background:transparent;font-size:20px;color:var(--ink);border-radius:10px;display:flex;align-items:center;justify-content:center;}
  .nav-btn:active{background:var(--paper);}
  .month-label{font-weight:700;font-size:16px;text-transform:capitalize;}
  .legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;padding:0 2px;}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink-soft);}
  .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .calendar-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px 10px 6px;margin-bottom:18px;}
  .weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
  .weekdays span{text-align:center;font-size:11px;color:var(--ink-soft);font-weight:600;}
  .days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .day{aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:11px;font-size:13px;position:relative;color:var(--ink);background:transparent;border:none;padding:0;}
  .day.empty{visibility:hidden;}
  .day.today{box-shadow:inset 0 0 0 1.5px var(--ink);font-weight:700;}
  .day .num{position:relative;z-index:1;}
  .day.booked{color:#fff;font-weight:700;}
  .day.booked.a{background:var(--accent-a);}
  .day.booked.b{background:var(--accent-b);}
  .day.booked.c{background:var(--accent-c);}
  .day:active{opacity:0.75;}
  .add-btn{width:100%;padding:14px;background:var(--ink);color:var(--paper);border:none;border-radius:14px;font-size:15px;font-weight:700;margin-bottom:22px;}
  .add-btn:active{opacity:0.85;}
  .section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;color:var(--ink-soft);margin:0 0 10px 2px;}
  .booking-list{list-style:none;margin:0;padding:0;}
  .booking-item{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:8px;}
  .booking-item .stripe{width:6px;align-self:stretch;border-radius:4px;flex-shrink:0;}
  .booking-item .stripe.a{background:var(--accent-a);}
  .booking-item .stripe.b{background:var(--accent-b);}
  .booking-item .stripe.c{background:var(--accent-c);}
  .booking-item .info{flex:1;min-width:0;}
  .booking-item .date{font-weight:700;font-size:14.5px;}
  .booking-item .person{font-size:12.5px;color:var(--ink-soft);margin-top:1px;}
  .empty-state{text-align:center;color:var(--ink-soft);font-size:13.5px;padding:30px 10px;}
  .overlay{position:fixed;inset:0;background:rgba(43,42,40,0.45);display:none;align-items:flex-end;justify-content:center;z-index:50;}
  .overlay.open{display:flex;}
  .sheet{background:var(--card);width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:20px 18px 26px;animation:slideup 0.2s ease-out;max-height:90vh;overflow-y:auto;}
  @keyframes slideup{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .sheet h2{margin:0 0 16px;font-size:17px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;}
  .field input[type=date]{width:100%;padding:12px;border-radius:10px;border:1px solid var(--line);font-size:15px;background:var(--paper);color:var(--ink);}
  .date-row{display:flex;gap:10px;}
  .date-row .field{flex:1;margin-bottom:0;}
  .person-pick{display:flex;flex-direction:column;gap:8px;}
  .person-pick button{padding:12px 10px;border-radius:10px;border:2px solid var(--line);background:var(--card);font-size:13.5px;font-weight:600;color:var(--ink-soft);text-align:left;}
  .person-pick button.selected.a{border-color:var(--accent-a);color:var(--accent-a);background:#eaf5ee;}
  .person-pick button.selected.b{border-color:var(--accent-b);color:var(--accent-b);background:#eaf1f9;}
  .person-pick button.selected.c{border-color:var(--accent-c);color:var(--accent-c);background:#fbeae7;}
  .sheet-actions{display:flex;gap:10px;margin-top:16px;}
  .sheet-actions button{flex:1;padding:13px;border-radius:12px;border:none;font-size:14.5px;font-weight:700;}
  .btn-primary{background:var(--ink);color:var(--paper);}
  .btn-secondary{background:var(--paper);color:var(--ink);border:1px solid var(--line) !important;}
  .btn-danger{background:var(--danger);color:#fff;}
  .warn{font-size:12.5px;color:var(--danger);margin-top:-8px;margin-bottom:14px;display:none;}
  .warn.show{display:block;}
  .loading{text-align:center;padding:40px 0;color:var(--ink-soft);font-size:14px;}
  .config-error{background:#FBEAE5;border:1px solid var(--danger);color:var(--danger);padding:14px;border-radius:12px;font-size:13px;line-height:1.5;}

  /* Ekran PIN */
  .pin-screen{
    display:flex;flex-direction:column;align-items:center;
    padding:60px 10px 20px;text-align:center;
  }
  .pin-screen p{color:var(--ink-soft);font-size:13.5px;margin:0 0 22px;}
  .pin-screen input{
    width:100%;max-width:220px;
    padding:16px;font-size:22px;letter-spacing:6px;text-align:center;
    border:1px solid var(--line);border-radius:12px;
    background:var(--card);color:var(--ink);
    margin-bottom:14px;
  }
  .pin-screen button{
    width:100%;max-width:220px;padding:14px;
    background:var(--ink);color:var(--paper);
    border:none;border-radius:12px;font-size:15px;font-weight:700;
  }
  .pin-error{color:var(--danger);font-size:12.5px;margin:-6px 0 14px;min-height:16px;}
  .change-pin{
    background:none;border:none;color:var(--ink-soft);
    font-size:12px;text-decoration:underline;margin-top:18px;padding:6px;
  }
</style>
</head>
<body>

<h1>Kalendarz KamperOwczy</h1>
<div class="status" id="status"></div>

<div id="app">
  <div class="loading">Wczytywanie…</div>
</div>

<div class="overlay" id="overlay">
  <div class="sheet" id="sheet"></div>
</div>

<script>
/* =========================================================
   KONFIGURACJA FIREBASE
   ========================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyAL7cT70ZpVV2JiIXe71v8zmq276JRz3f8",
  authDomain: "calendar-dd5eb.firebaseapp.com",
  projectId: "calendar-dd5eb",
  storageBucket: "calendar-dd5eb.firebasestorage.app",
  messagingSenderId: "305918917533",
  appId: "1:305918917533:web:d1c3731f641a63f3090d74"
};
/* ========================================================= */

const MONTHS = ["styczeń","luty","marzec","kwiecień","maj","czerwiec","lipiec","sierpień","wrzesień","październik","listopad","grudzień"];
const WEEKDAYS = ["Pn","Wt","Śr","Cz","Pt","So","Nd"];
const PEOPLE = [
  {id:"a", name:"Birmy i Zawrat"},
  {id:"b", name:"Rajeczniki"},
  {id:"c", name:"NIEDOSTĘPNY"}
];
const PIN_STORAGE_KEY = "kalendarz_pin_v1";

let bookings = []; // { id, start: 'YYYY-MM-DD', end: 'YYYY-MM-DD', person }
let cursor = new Date();
cursor.setDate(1);
let db = null;
let docRef = null;
let unsubscribe = null;
let configOk = firebaseConfig.apiKey && firebaseConfig.apiKey !== "WKLEJ_TU";

function pad(n){ return n.toString().padStart(2,"0"); }
function fmtISO(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function fmtDisplay(iso){
  const [y,m,d] = iso.split("-").map(Number);
  return `${pad(d)}.${pad(m)}.${y}`;
}
function fmtRange(start,end){
  return start === end ? fmtDisplay(start) : `${fmtDisplay(start)} – ${fmtDisplay(end)}`;
}
function personById(id){ return PEOPLE.find(p=>p.id===id); }

function rangesOverlap(startA,endA,startB,endB){
  return startA <= endB && startB <= endA;
}
function isRangeBooked(start,end,excludeId){
  return bookings.some(b => b.id !== excludeId && rangesOverlap(start,end,b.start,b.end));
}
function findBookingForDate(iso){
  return bookings.find(b => iso >= b.start && iso <= b.end);
}

async function saveBookings(){
  try{
    await docRef.set({ list: bookings });
  }catch(e){
    alert("Nie udało się zapisać zmian. Sprawdź połączenie z internetem.");
  }
}

/* ============== PIN GATE ============== */

function showPinScreen(errorMsg){
  const app = document.getElementById('app');
  document.getElementById('status').textContent = "";
  app.innerHTML = `
    <div class="pin-screen">
      <p>Podaj kod dostępu, aby zobaczyć kalendarz.</p>
      <input type="tel" inputmode="numeric" id="pin-input" maxlength="8" placeholder="••••">
      <div class="pin-error">${errorMsg || ""}</div>
      <button onclick="submitPin()">Wejdź</button>
    </div>
  `;
  const input = document.getElementById('pin-input');
  input.focus();
  input.addEventListener('keydown', (e)=>{ if(e.key === 'Enter') submitPin(); });
}

function submitPin(){
  const val = document.getElementById('pin-input').value.trim();
  if(!val) return;
  tryConnect(val);
}

function tryConnect(pin){
  const ref = db.collection('kalendarz_' + pin).doc('rezerwacje');
  ref.get().then(()=>{
    localStorage.setItem(PIN_STORAGE_KEY, pin);
    docRef = ref;
    subscribeAndRender();
  }).catch(()=>{
    localStorage.removeItem(PIN_STORAGE_KEY);
    showPinScreen("Nieprawidłowy kod. Spróbuj ponownie.");
  });
}

function changePin(){
  if(unsubscribe){ unsubscribe(); unsubscribe = null; }
  localStorage.removeItem(PIN_STORAGE_KEY);
  showPinScreen();
}

function subscribeAndRender(){
  if(unsubscribe){ unsubscribe(); }
  unsubscribe = docRef.onSnapshot((snap)=>{
    const data = snap.data();
    bookings = (data && data.list) ? data.list : [];
    document.getElementById('status').textContent = "Połączono — zmiany widoczne dla wszystkich na żywo";
    render();
  }, ()=>{
    document.getElementById('status').textContent = "Błąd połączenia z bazą danych";
  });
}

/* ============== RENDER ============== */

function render(){
  const app = document.getElementById('app');

  const year = cursor.getFullYear();
  const month = cursor.getMonth();
  const first = new Date(year, month, 1);
  let startOffset = (first.getDay() + 6) % 7;
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayISO = fmtISO(new Date());

  let cells = "";
  for(let i=0;i<startOffset;i++) cells += `<button class="day empty"></button>`;
  for(let d=1; d<=daysInMonth; d++){
    const iso = fmtISO(new Date(year, month, d));
    const booking = findBookingForDate(iso);
    let cls = "day";
    if(iso === todayISO) cls += " today";
    if(booking) cls += " booked " + booking.person;
    cells += `<button class="${cls}" onclick="onDayTap('${iso}')"><span class="num">${d}</span></button>`;
  }

  const legend = PEOPLE.map(p=>`<div class="legend-item"><span class="dot" style="background:var(--accent-${p.id})"></span>${p.name}</div>`).join("");

  const sorted = [...bookings].sort((x,y)=> x.start < y.start ? -1 : 1);
  let listHtml = "";
  if(sorted.length === 0){
    listHtml = `<div class="empty-state">Brak rezerwacji. Dodaj pierwszy termin powyżej.</div>`;
  } else {
    listHtml = `<ul class="booking-list">` + sorted.map(b=>{
      const p = personById(b.person);
      return `<li class="booking-item" onclick="openEdit('${b.id}')">
        <div class="stripe ${b.person}"></div>
        <div class="info">
          <div class="date">${fmtRange(b.start,b.end)}</div>
          <div class="person">${p ? p.name : b.person}</div>
        </div>
      </li>`;
    }).join("") + `</ul>`;
  }

  app.innerHTML = `
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="month-label">${MONTHS[month]} ${year}</div>
      <button class="nav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="legend">${legend}</div>
    <div class="calendar-card">
      <div class="weekdays">${WEEKDAYS.map(w=>`<span>${w}</span>`).join("")}</div>
      <div class="days">${cells}</div>
    </div>
    <button class="add-btn" onclick="openNew()">+ Nowa rezerwacja</button>
    <div class="section-title">Rezerwacje</div>
    ${listHtml}
    <button class="change-pin" onclick="changePin()">WYLOGUJ</button>
  `;
}

function changeMonth(delta){ cursor.setMonth(cursor.getMonth()+delta); render(); }

function onDayTap(iso){
  const existing = findBookingForDate(iso);
  if(existing){ openEdit(existing.id); } else { openNew(iso); }
}

function openNew(prefillISO){
  const dateVal = prefillISO || fmtISO(new Date());
  showSheet(`
    <h2>Nowa rezerwacja</h2>
    <div class="date-row">
      <div class="field">
        <label>Od</label>
        <input type="date" id="f-start" value="${dateVal}" onchange="syncEndMin('f-start','f-end')">
      </div>
      <div class="field">
        <label>Do</label>
        <input type="date" id="f-end" value="${dateVal}">
      </div>
    </div>
    <div class="warn" id="f-warn">Wybrany zakres pokrywa się z istniejącą rezerwacją.</div>
    <div class="field">
      <label>Osoba</label>
      <div class="person-pick" id="f-person">
        ${PEOPLE.map((p,i)=>`<button class="${p.id} ${i===0?'selected':''}" data-id="${p.id}" onclick="pickPerson('${p.id}')">${p.name}</button>`).join("")}
      </div>
    </div>
    <div class="sheet-actions">
      <button class="btn-secondary" onclick="closeSheet()">Anuluj</button>
      <button class="btn-primary" onclick="confirmNew()">Zatwierdź</button>
    </div>
  `);
}

function syncEndMin(startId,endId){
  const start = document.getElementById(startId).value;
  const endEl = document.getElementById(endId);
  if(endEl.value < start){ endEl.value = start; }
}

function pickPerson(id){
  document.querySelectorAll('#f-person button').forEach(b=>{ b.classList.toggle('selected', b.dataset.id === id); });
}
function getSelectedPerson(containerId){
  const sel = document.querySelector(`#${containerId} button.selected`);
  return sel ? sel.dataset.id : PEOPLE[0].id;
}

async function confirmNew(){
  const start = document.getElementById('f-start').value;
  const end = document.getElementById('f-end').value;
  if(!start || !end) return;
  const s = start <= end ? start : end;
  const e = start <= end ? end : start;
  if(isRangeBooked(s,e)){
    document.getElementById('f-warn').classList.add('show');
    return;
  }
  const person = getSelectedPerson('f-person');
  bookings.push({ id: 'b'+Date.now()+Math.random().toString(36).slice(2,6), start:s, end:e, person });
  await saveBookings();
  closeSheet();
}

function openEdit(id){
  const b = bookings.find(x=>x.id===id);
  if(!b) return;
  showSheet(`
    <h2>Edytuj rezerwację</h2>
    <div class="date-row">
      <div class="field">
        <label>Od</label>
        <input type="date" id="f-start-edit" value="${b.start}" onchange="syncEndMin('f-start-edit','f-end-edit')">
      </div>
      <div class="field">
        <label>Do</label>
        <input type="date" id="f-end-edit" value="${b.end}">
      </div>
    </div>
    <div class="warn" id="f-warn-edit">Wybrany zakres pokrywa się z istniejącą rezerwacją.</div>
    <div class="field">
      <label>Osoba</label>
      <div class="person-pick" id="f-person-edit">
        ${PEOPLE.map(p=>`<button class="${p.id} ${p.id===b.person?'selected':''}" data-id="${p.id}" onclick="pickPersonEdit('${p.id}')">${p.name}</button>`).join("")}
      </div>
    </div>
    <div class="sheet-actions">
      <button class="btn-danger" onclick="deleteBooking('${id}')">Usuń</button>
      <button class="btn-primary" onclick="confirmEdit('${id}')">Zapisz</button>
    </div>
  `);
}

function pickPersonEdit(id){
  document.querySelectorAll('#f-person-edit button').forEach(b=>{ b.classList.toggle('selected', b.dataset.id === id); });
}

async function confirmEdit(id){
  const start = document.getElementById('f-start-edit').value;
  const end = document.getElementById('f-end-edit').value;
  if(!start || !end) return;
  const s = start <= end ? start : end;
  const e = start <= end ? end : start;
  if(isRangeBooked(s,e,id)){
    document.getElementById('f-warn-edit').classList.add('show');
    return;
  }
  const person = getSelectedPerson('f-person-edit');
  const b = bookings.find(x=>x.id===id);
  b.start = s;
  b.end = e;
  b.person = person;
  await saveBookings();
  closeSheet();
}

async function deleteBooking(id){
  bookings = bookings.filter(b=>b.id!==id);
  await saveBookings();
  closeSheet();
}

function showSheet(html){
  document.getElementById('sheet').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
}
function closeSheet(){ document.getElementById('overlay').classList.remove('open'); }
document.getElementById('overlay').addEventListener('click', (e)=>{ if(e.target.id === 'overlay') closeSheet(); });

/* ============== INIT ============== */

function init(){
  if(!configOk){
    document.getElementById('app').innerHTML = `<div class="config-error">
      Brakuje konfiguracji Firebase. Znajdź sekcję <strong>KONFIGURACJA FIREBASE</strong>
      na górze pliku i wklej tam dane swojego projektu.
    </div>`;
    return;
  }
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();

  const savedPin = localStorage.getItem(PIN_STORAGE_KEY);
  if(savedPin){
    tryConnect(savedPin);
  } else {
    showPinScreen();
  }
}

init();
</script>
</body>
</html>
